[Database]
# Configuração da conexão SQL Server PULSE DOMINOS
# Ajuste conforme o seu ambiente

# Servidor SQL Server (use . ou localhost para local)
Server = .

# Nome da base de dados
Database = POS

# Autenticação Windows (True) ou SQL Server (False)
TrustedConnection = True

# Se TrustedConnection = False, preencha:
Username = 
Password = 

# Driver ODBC (geralmente não precisa alterar)
Driver = ODBC Driver 17 for SQL Server

[Settings]
# Código da loja/localização (usado em todas as SPs)
LocationCode = 01

# Timeout para queries (0 = sem limite)
CommandTimeout = 0

[Output]
# Diretório padrão para salvar ficheiros SAFT
DefaultOutputPath = ./output

# Formato do nome do ficheiro: SAFT_{start}_{end}.xml
FilenameFormat = SAFT_{start}_{end}.xml
